<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InteroHR</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: linear-gradient(180deg, #0f2a44, #0b1f33);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    .wordmark {
      width: 200px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.6;
    }

    .cta {
      margin-top: 30px;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      margin: 10px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2dd4bf, #3b82f6);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .secondary {
      background: rgba(255,255,255,0.1);
    }

    .screenshots {
      margin-top: 50px;
    }

    .screenshots img {
      width: 100%;
      max-width: 300px;
      margin: 10px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .nav {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .nav a {
      margin-left: 20px;
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
    }

    .nav a:hover {
      color: white;
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="Learn.html">Learn</a>
  </div>

  <div class="container">

    <!-- BRAND -->
    <img src="AppIcon 512x512 Transparent.png" class="logo" />
    <img src="InteroHR Word only.png" class="wordmark" />

    <!-- HERO -->
    <h1>Train Your Inner Awareness</h1>
    <p>
      InteroHR helps you measure, train, and improve your awareness of your own body — starting with your heart rate.
    </p>

    <div class="cta">
      <a href="mailto:hello@example.com" class="button">
        Coming to the App Store
      </a>

      <a href="Learn.html" class="button secondary">
        Learn the Science
      </a>
    </div>

    <!-- SCREENSHOTS -->
    <div class="screenshots">
      <img src="screenshot1.png" />
      <img src="screenshot2.png" />
      <img src="screenshot3.png" />
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <p>
        InteroHR is designed for training and awareness purposes only. Not medical advice.
      </p>
    </div>

  </div>

</body>
</html>
